name: CI Pipeline

on:
  push:
    branches:
      - main
      - devel
      - stage
      - 'feature/**'
      - 'bugfix/**'
  pull_request:
    branches:
      - main
      - devel
      - stage

jobs:
  install:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '15'

      - name: Install dependencies
        run: npm install

      - name: Cache node_modules
        uses: actions/cache@v3
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('package-lock.json') }}

  lint:
    needs: [install]
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '15'

      - name: Install dependencies
        run: npm install

      - name: Run linter
        run: npm run lint

      - name: Run formatter
        run: npm run prettier

  test:
    needs: [install]
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '15'

      - name: Install dependencies
        run: npm install

      - name: Run tests
        env:
          CI: true
        run: npm run test -- --watchAll=false

  build:
    needs: [lint, test]
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '15'

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build
